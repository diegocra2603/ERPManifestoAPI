version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: erp_manifesto_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - erp_manifesto_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - erp_manifesto_network
    restart: unless-stopped

volumes:
  erp_manifesto_postgres_data:
    driver: local

networks:
  erp_manifesto_network:
    driver: bridge
